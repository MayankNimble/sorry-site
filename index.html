<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I'm Sorry ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="hearts"></div>
<div class="hearts-container" id="hearts"></div>
<!-- BACKGROUND -->
<div class="bg"></div>

<!-- HERO -->
<section class="hero">
  <h1>I'm Sorry, Babe ❤️</h1>
  <p>You mean more to me than anything...</p>

  <img src="assets/eren.jpg" id="character">
  <p class="hint">Tap me 💌</p>
</section>

<!-- SCROLL -->
<section class="scroll">
  <button id="openBtn">Read my heart 💔</button>
</section>

<!-- DIALOG -->
<div class="dialog" id="dialog">
  <div class="box">
    <span id="close">✖</span>
    <p id="typing"></p>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop autoplay muted>
  <source src="assets/music.mp3" type="audio/mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
<button id="musicToggle">🎵</button>
